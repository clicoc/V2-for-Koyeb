name: "Build and push hf images"

on:
  workflow_dispatch:
  push:
    branches:
      - hf-space   # 只有在这个分支代码变动时才打包

jobs:
  Building:
    runs-on: ubuntu-latest
    name: "Build V2ray HF images"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: hf-space # 强制锁定切出 hf-space 分支的代码来编译

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/clicoc/v2-for-koyeb:hf-latest # 独立标签，不冲突
